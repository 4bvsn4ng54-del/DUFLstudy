<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="中国方言电影资料库——探索不同方言类型电影的传播轨迹">
  <title>方言电影资料库 — 被世界听懂的"土味"乡音</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Serif+SC:wght@400;500;600;700;900&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      corePlugins: { preflight: false },
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            serif: ['Noto Serif SC', 'serif'],
          },
        },
      },
    }
  </script>

  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
</head>
<body>

  <!-- Theme Toggle -->
  <button class="theme-toggle" id="themeToggle" aria-label="切换暗色模式">
    <span class="theme-icon"></span>
  </button>

  <!-- Global Navigation -->
  <nav class="global-nav">
    <div class="global-nav-inner">
      <a href="index.html" class="nav-brand serif">越是地方的，越是世界的</a>
      <div class="nav-links">
        <a href="index.html">首页</a>
        <a href="deep-dive.html">深度分析</a>
        <a href="films.html" class="active">资料库</a>
        <a href="visualizations.html">可视化</a>
        <a href="case-studies.html">案例</a>
        <a href="timeline.html">脉络</a>
        <a href="methodology.html">方法</a>
        <a href="glossary.html">术语</a>
        <a href="about.html">关于</a>
      </div>
      <button class="nav-mobile-toggle" id="mobileNavToggle" aria-label="菜单">
        <span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Hero -->
  <section class="page-hero parallax-container">
    <div class="container">
      <p class="section-eyebrow parallax-layer" data-depth="0.3">Film Database</p>
      <h1 class="page-hero-title serif parallax-layer" data-depth="0.15">方言电影<br>资料库</h1>
      <p class="page-hero-subtitle parallax-layer" data-depth="0.05">探索不同方言类型电影的传播轨迹<br>从地方叙事到跨文化流动</p>
    </div>
  </section>

  <!-- Filter Bar -->
  <section class="section" style="padding-bottom:40px;background:var(--sk-fill);">
    <div class="container-wide">
      <div class="filter-bar reveal">
        <!-- Dialect filter -->
        <div class="filter-group">
          <span class="filter-label">方言类型</span>
          <div class="filter-options" data-filter="dialect">
            <button class="filter-chip active" data-value="all">全部</button>
            <button class="filter-chip" data-value="minnan">闽南语</button>
            <button class="filter-chip" data-value="shanghainese">上海话</button>
            <button class="filter-chip" data-value="cantonese">粤语</button>
            <button class="filter-chip" data-value="wuhan">武汉话</button>
            <button class="filter-chip" data-value="hakka">客家话</button>
            <button class="filter-chip" data-value="sichuan">四川话</button>
            <button class="filter-chip" data-value="other">其他方言</button>
          </div>
        </div>

        <!-- Breakthrough filter -->
        <div class="filter-group">
          <span class="filter-label">破圈程度</span>
          <div class="filter-options" data-filter="breakthrough">
            <button class="filter-chip active" data-value="all">全部</button>
            <button class="filter-chip" data-value="national">全民破圈</button>
            <button class="filter-chip" data-value="regional">区域破圈</button>
            <button class="filter-chip" data-value="local">本地圈层</button>
          </div>
        </div>

        <!-- Sort -->
        <div class="filter-group">
          <span class="filter-label">排序</span>
          <div class="filter-options" data-filter="sort">
            <button class="filter-chip active" data-value="boxoffice">票房降序</button>
            <button class="filter-chip" data-value="year">年份降序</button>
            <button class="filter-chip" data-value="rating">评分降序</button>
          </div>
        </div>
      </div>

      <!-- Result count -->
      <p class="result-count reveal" id="resultCount">共 <span>12</span> 部影片</p>
    </div>
  </section>

  <!-- Film Cards Grid -->
  <section class="section" style="padding-top:0;background:var(--sk-fill);">
    <div class="container-wide">
      <div class="film-grid reveal-stagger" id="filmGrid">
        <!-- Film cards will be rendered by JS -->
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer" style="border-top:1px solid var(--border);">
    <div class="container">
      <div class="footer-bottom" style="border:none;padding-top:0;">
        <a href="index.html" class="back-to-top">← 返回首页</a>
        <p style="margin-top:24px;">© 2026 方言电影传播研究 · 大连外国语大学 · 数据新闻大赛</p>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
  <script src="films-data.js"></script>
  <script src="effects3d.js"></script>
</body>
</html>
